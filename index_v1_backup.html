<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>まとめ買いリスト</title>
<style>
:root{
  --bg:#faf7f2; --card:#ffffff; --ink:#333; --sub:#888;
  --main:#e8873c; --main-d:#c96f28; --green:#6aa84f; --line:#eee2d5;
  --danger:#d9534f;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{margin:0; font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif; background:var(--bg); color:var(--ink); padding-bottom:70px;}
header{position:sticky; top:0; z-index:10; background:var(--main); color:#fff; padding:12px 16px; font-size:18px; font-weight:bold; box-shadow:0 2px 6px rgba(0,0,0,.12);}
main{max-width:640px; margin:0 auto; padding:12px;}
nav{position:fixed; bottom:0; left:0; right:0; z-index:10; display:flex; background:#fff; border-top:1px solid var(--line); box-shadow:0 -2px 8px rgba(0,0,0,.06);}
nav button{flex:1; border:none; background:none; padding:8px 0 10px; font-size:11px; color:var(--sub); cursor:pointer;}
nav button .ic{display:block; font-size:20px; margin-bottom:2px;}
nav button.on{color:var(--main); font-weight:bold;}
h2{font-size:15px; margin:14px 2px 8px; color:var(--main-d);}
.card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px;}
.btn{display:inline-block; border:none; border-radius:10px; padding:10px 16px; font-size:14px; cursor:pointer; background:var(--main); color:#fff; font-weight:bold;}
.btn.sub{background:#fff; color:var(--main-d); border:1.5px solid var(--main);}
.btn.gray{background:#f0ebe3; color:#777; font-weight:normal;}
.btn.danger{background:#fff; color:var(--danger); border:1.5px solid var(--danger);}
.btn.small{padding:6px 10px; font-size:12px; border-radius:8px;}
.btn.wide{display:block; width:100%; text-align:center;}
input[type=text],input[type=number],select{font-size:15px; padding:8px; border:1px solid #ddd; border-radius:8px; background:#fff; color:var(--ink);}
input:focus,select:focus{outline:2px solid var(--main);}
.search{width:100%; margin-bottom:8px;}
/* 献立表(週) */
.day{display:flex; align-items:flex-start; gap:8px; padding:9px 0; border-bottom:1px dashed var(--line);}
.day:last-child{border-bottom:none;}
.day .dname{width:34px; height:34px; border-radius:50%; background:#f6ede1; color:var(--main-d); font-weight:bold; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:14px;}
.day.sat .dname{background:#e3edf7; color:#4a7ab5;}
.day.sun .dname{background:#f9e3e3; color:#c05555;}
.day .chips{flex:1; display:flex; flex-wrap:wrap; gap:6px; align-items:center; min-height:34px;}
.chip{background:#fdf3e7; border:1px solid #f0d9bd; border-radius:16px; padding:5px 10px; font-size:13px; display:inline-flex; align-items:center; gap:6px;}
.chip .x{color:#c9a; cursor:pointer; font-weight:bold; padding:0 2px;}
.addbtn{width:34px; height:34px; border-radius:50%; border:1.5px dashed var(--main); background:none; color:var(--main); font-size:18px; cursor:pointer; flex-shrink:0;}
/* 献立一覧 */
.catbar{display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:6px;}
.catbar .btn{flex-shrink:0;}
.dishrow{display:flex; justify-content:space-between; align-items:center; padding:10px 4px; border-bottom:1px solid var(--line); cursor:pointer;}
.dishrow:last-child{border-bottom:none;}
.dishrow .nm{font-size:14px;}
.dishrow .ings{font-size:11px; color:var(--sub); margin-top:2px;}
.dishrow .arrow{color:#ccb; font-size:16px;}
/* 日用品 */
.goodsgrid{display:flex; flex-wrap:wrap; gap:8px;}
.gbtn{border:1.5px solid #ddd; background:#fff; border-radius:20px; padding:9px 14px; font-size:14px; cursor:pointer; color:#555;}
.gbtn.sel{background:var(--green); border-color:var(--green); color:#fff; font-weight:bold;}
.gbtn .del{margin-left:6px; color:var(--danger); font-weight:bold;}
/* 買い物リスト */
.item{display:flex; align-items:center; gap:8px; padding:9px 2px; border-bottom:1px solid var(--line);}
.item:last-child{border-bottom:none;}
.item .info{flex:1; min-width:0;}
.item .inm{font-size:14px;}
.item .iq{font-size:12px; color:var(--sub);}
.item.stocked .inm,.item.stocked .iq{text-decoration:line-through; color:#bbb;}
.item.done .inm,.item.done .iq{text-decoration:line-through; color:#bbb;}
.storechip{border:none; border-radius:8px; padding:6px 9px; font-size:12px; cursor:pointer; font-weight:bold; color:#fff; flex-shrink:0; min-width:52px;}
.stockbtn{border:1px solid #ddd; background:#fff; border-radius:8px; padding:6px 8px; font-size:11px; color:#999; cursor:pointer; flex-shrink:0;}
.stockbtn.on{background:#8a8a8a; color:#fff; border-color:#8a8a8a;}
.checkbox{width:24px; height:24px; border:2px solid #ccc; border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size:15px; cursor:pointer;}
.item.done .checkbox{background:var(--green); border-color:var(--green);}
.storehead{font-size:14px; font-weight:bold; color:#fff; padding:6px 12px; border-radius:8px; margin:14px 0 4px; display:inline-block;}
.note{font-size:12px; color:var(--sub); margin:6px 2px;}
/* モーダル */
#overlay{position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:20; display:none; align-items:flex-end; justify-content:center;}
#overlay.show{display:flex;}
#modal{background:#fff; width:100%; max-width:640px; max-height:85vh; border-radius:16px 16px 0 0; padding:16px; overflow-y:auto;}
.mhead{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.mhead b{font-size:16px;}
.ingrow{display:flex; gap:6px; margin-bottom:6px;}
.ingrow input.n{flex:1; min-width:0;}
.ingrow input.q{width:64px;}
.ingrow input.u{width:64px;}
.ingrow .rm{border:none; background:none; color:var(--danger); font-size:18px; cursor:pointer; padding:0 4px;}
.pickrow{padding:11px 4px; border-bottom:1px solid var(--line); font-size:14px; cursor:pointer; display:flex; justify-content:space-between;}
.pickrow .added{color:var(--green); font-weight:bold;}
.flash{position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:8px 18px; border-radius:20px; font-size:13px; z-index:30; opacity:0; transition:opacity .3s; pointer-events:none;}
.flash.show{opacity:.92;}
.row2{display:flex; gap:8px; margin-top:8px;}
.row2 .btn{flex:1; text-align:center;}
</style>

  if(!S||!S.dishes) S=newState();
  if(!S.family) S.family=3;
  S.dishes.forEach(d=>{ if(!d.sv) d.sv=3; });
}
function save(){ localStorage.setItem(KEY,JSON.stringify(S)); }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtQ(q){
  if(q===""||q==null||isNaN(q)) return "";
  if(q===0.25) return "1/4"; if(q===0.5) return "1/2"; if(q===0.75) return "3/4";
  return String(Math.round(q*100)/100);
}
function flash(msg){
  const f=document.getElementById("flash"); f.textContent=msg; f.classList.add("show");
  clearTimeout(f._t); f._t=setTimeout(()=>f.classList.remove("show"),1200);
}
function dish(id){ return S.dishes.find(d=>d.id===id); }
function storeColor(name){
  const i=S.stores.indexOf(name);
  return i<0 ? "#aaaaaa" : STORE_COLORS[i%STORE_COLORS.length];
}

/* ===== タブ切り替え ===== */
let TAB="week";
let dishSearch="", dishCat="";
function go(t){ TAB=t; render(); }
function render(){
  ["week","dish","goods","shop"].forEach(t=>document.getElementById("nav-"+t).classList.toggle("on",t===TAB));
  const v=document.getElementById("view");
  if(TAB==="week") v.innerHTML=rWeek();
  else if(TAB==="dish") v.innerHTML=rDish();
  else if(TAB==="goods") v.innerHTML=rGoods();
  else v.innerHTML=rShop();
}

/* ===== 献立表（週） ===== */
function rWeek(){
  let h='<h2>家族の人数</h2>';
  h+='<div class="card" style="display:flex;align-items:center;gap:12px;">';
  h+='<button class="btn sub" style="width:44px;padding:8px 0;text-align:center;" onclick="setFamily(-1)">−</button>';
  h+=`<b style="font-size:18px;">${S.family}人</b>`;
  h+='<button class="btn sub" style="width:44px;padding:8px 0;text-align:center;" onclick="setFamily(1)">＋</button>';
  h+='<span class="note" style="margin:0;">テンプレの基準人数から自動で分量を換算します</span></div>';
  h+='<h2>今週の献立表</h2><div class="card">';
  DAYS.forEach((d,i)=>{
    const cls=i===5?"sat":i===6?"sun":"";
    h+=`<div class="day ${cls}"><div class="dname">${d}</div><div class="chips">`;
    S.week[i].forEach((id,j)=>{
      const ds=dish(id); if(!ds) return;
      h+=`<span class="chip">${esc(ds.name)}<span class="x" onclick="rmWeek(${i},${j})">×</span></span>`;
    });
    h+=`</div><button class="addbtn" onclick="openPicker(${i})">＋</button></div>`;
  });
  h+='</div>';
  h+='<div class="row2"><button class="btn sub" onclick="clearWeek()">献立表をクリア</button><button class="btn" onclick="go(\'shop\')">🛒 買い物リストへ</button></div>';
  h+='<p class="note">＋を押して献立を選んでいくと、材料を自動で合算して買い物リストを作れます。</p>';
  return h;
}
function setFamily(d){ S.family=Math.min(12,Math.max(1,S.family+d)); save(); render(); }
function rmWeek(d,j){ S.week[d].splice(j,1); save(); render(); }
function clearWeek(){ if(confirm("今週の献立表をすべて消しますか？")){ S.week=[[],[],[],[],[],[],[]]; save(); render(); } }

/* 献立ピッカー */
let pickDay=0, pickSearch="";
function openPicker(d){ pickDay=d; pickSearch=""; showModal(); renderPicker(); }
function renderPicker(){
  let h=`<div class="mhead"><b>${DAYS[pickDay]}曜日に追加</b><button class="btn small gray" onclick="closeModal()">閉じる</button></div>`;
  h+=`<input type="text" class="search" placeholder="料理名で検索" value="${esc(pickSearch)}" oninput="pickSearch=this.value;renderPicker()">`;
  const q=pickSearch.trim();
  CATS.forEach(c=>{
    const ds=S.dishes.filter(d=>d.cat===c&&(!q||d.name.includes(q)));
    if(!ds.length) return;
    h+=`<h2>${c}</h2>`;
    ds.forEach(d=>{
      const n=S.week[pickDay].filter(x=>x===d.id).length;
      h+=`<div class="pickrow" onclick="pickAdd('${d.id}')"><span>${esc(d.name)}</span>${n?`<span class="added">✓${n>1?"×"+n:""}</span>`:""}</div>`;
    });
  });
  document.getElementById("modal").innerHTML=h;
}
function pickAdd(id){ S.week[pickDay].push(id); save(); flash(dish(id).name+" を追加"); renderPicker(); }

/* ===== 献立（テンプレ管理） ===== */
function rDish(){
  let h='<h2>献立テンプレ（タップで材料を編集）</h2>';
  h+=`<input type="text" class="search" placeholder="料理名・材料名で検索" value="${esc(dishSearch)}" oninput="dishSearch=this.value;render()">`;
  h+='<div class="catbar"><button class="btn small '+(dishCat===""?"":"gray")+'" onclick="dishCat=\'\';render()">全部</button>';
  CATS.forEach(c=>{ h+=`<button class="btn small ${dishCat===c?"":"gray"}" onclick="dishCat='${c}';render()">${c}</button>`; });
  h+='</div>';
  const q=dishSearch.trim();
  const list=S.dishes.filter(d=>(!dishCat||d.cat===dishCat)&&(!q||d.name.includes(q)||d.ing.some(i=>i.n.includes(q))));
  h+='<div class="card">';
  if(!list.length) h+='<p class="note">見つかりません</p>';
  list.forEach(d=>{
    h+=`<div class="dishrow" onclick="openEditor('${d.id}')"><div><div class="nm">${esc(d.name)}</div><div class="ings">${esc(d.ing.map(i=>i.n).join("・"))||"材料未設定"}</div></div><span class="arrow">›</span></div>`;
  });
  h+='</div>';
  h+='<button class="btn wide" onclick="openEditor(null)">＋ 新しい献立を作る</button>';
  h+='<div class="row2"><button class="btn sub small" onclick="exportData()">バックアップ保存</button><button class="btn sub small" onclick="document.getElementById(\'imp\').click()">読み込み</button><button class="btn danger small" onclick="resetAll()">初期化</button></div>';
  h+='<input type="file" id="imp" accept=".json" style="display:none" onchange="importData(this)">';
  h+='<p class="note">「コピーを作る」で同じ料理の食べ盛り版（増量版）などが作れます。テンプレの分量は基準3人分の目安。買い物リストでは献立表タブの「家族の人数」に合わせて自動換算します。</p>';
  return h;
}

/* 献立エディタ */
let editTarget=null; /* {id or null, name, cat, ing:[...]} */
function openEditor(id){
  if(id){ const d=dish(id); editTarget={id:id, name:d.name, cat:d.cat, sv:d.sv||3, ing:d.ing.map(x=>({...x}))}; }
  else editTarget={id:null, name:"", cat:dishCat||"主食", sv:S.family||3, ing:[{n:"",q:"",u:""}]};
  showModal(); renderEditor();
}
function renderEditor(){
  const t=editTarget;
  let h=`<div class="mhead"><b>${t.id?"献立を編集":"新しい献立"}</b><button class="btn small gray" onclick="closeModal()">閉じる</button></div>`;
  h+=`<div style="display:flex;gap:8px;margin-bottom:10px;"><input type="text" style="flex:1;min-width:0" placeholder="料理名" value="${esc(t.name)}" oninput="editTarget.name=this.value">`;
  h+=`<select onchange="editTarget.cat=this.value">`;
  CATS.forEach(c=>{ h+=`<option ${c===t.cat?"selected":""}>${c}</option>`; });
  h+=`</select></div>`;
  h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:14px;">下の分量は<input type="number" min="1" style="width:60px" value="${t.sv}" oninput="editTarget.sv=this.value">人分</div>`;
  h+='<div style="font-size:12px;color:#888;margin-bottom:4px;">材料　／　数量　／　単位（個・g・本など）</div>';
  t.ing.forEach((g,i)=>{
    h+=`<div class="ingrow"><input class="n" type="text" placeholder="材料名" value="${esc(g.n)}" oninput="editTarget.ing[${i}].n=this.value">`;
    h+=`<input class="q" type="number" step="any" placeholder="数" value="${g.q}" oninput="editTarget.ing[${i}].q=this.value">`;
    h+=`<input class="u" type="text" placeholder="単位" value="${esc(g.u)}" oninput="editTarget.ing[${i}].u=this.value">`;
    h+=`<button class="rm" onclick="editTarget.ing.splice(${i},1);renderEditor()">✕</button></div>`;
  });
  h+='<button class="btn sub small" onclick="editTarget.ing.push({n:\'\',q:\'\',u:\'\'});renderEditor()">＋ 材料を追加</button>';
  h+='<div class="row2"><button class="btn" onclick="saveDish()">保存</button>';
  if(t.id) h+='<button class="btn sub" onclick="copyDish()">コピーを作る</button><button class="btn danger" onclick="delDish()">削除</button>';
  h+='</div>';
  document.getElementById("modal").innerHTML=h;
}
function cleanIng(){ return editTarget.ing.filter(g=>g.n.trim()).map(g=>({n:g.n.trim(), q:g.q===""?"":Number(g.q), u:g.u.trim()})); }
function saveDish(){
  const t=editTarget;
  if(!t.name.trim()){ alert("料理名を入れてください"); return; }
  const sv=Math.max(1,Number(t.sv)||3);
  if(t.id){ const d=dish(t.id); d.name=t.name.trim(); d.cat=t.cat; d.sv=sv; d.ing=cleanIng(); }
  else { S.dishes.push({id:"u"+(S.nextId++), name:t.name.trim(), cat:t.cat, sv:sv, ing:cleanIng()}); }
  save(); closeModal(); render(); flash("保存しました");
}
function copyDish(){
  const t=editTarget;
  S.dishes.push({id:"u"+(S.nextId++), name:t.name.trim()+"（食べ盛り）", cat:t.cat, sv:Math.max(1,Number(t.sv)||3), ing:cleanIng()});
  save(); closeModal(); render(); flash("コピーを作りました。分量を調整してね");
}
function delDish(){
  if(!confirm("この献立を削除しますか？")) return;
  const id=editTarget.id;
  S.dishes=S.dishes.filter(d=>d.id!==id);
  S.week=S.week.map(day=>day.filter(x=>x!==id));
  save(); closeModal(); render();
}

/* ===== 日用品 ===== */
let goodsEdit=false;
function rGoods(){
  let h='<h2>日用品・いつも買うもの</h2>';
  h+='<p class="note">買いたいものをポンポン押して緑にする → 買い物リストに入ります。</p>';
  h+='<div class="card"><div class="goodsgrid">';
  S.goods.forEach((g,i)=>{
    const sel=S.goodsSel[g];
    h+=`<button class="gbtn ${sel?"sel":""}" onclick="${goodsEdit?`delGoods(${i})`:`togGoods('${esc(g)}')`}">${esc(g)}${goodsEdit?'<span class="del">✕</span>':''}</button>`;
  });
  h+='</div></div>';
  h+='<div class="row2"><button class="btn sub" onclick="addGoods()">＋ ボタンを追加</button>';
  h+=`<button class="btn ${goodsEdit?"":"gray"}" onclick="goodsEdit=!goodsEdit;render()">${goodsEdit?"編集おわり":"ボタンを整理"}</button></div>`;
  const n=Object.keys(S.goodsSel).filter(k=>S.goodsSel[k]).length;
  if(n) h+=`<p class="note">✅ ${n}個 選択中 → <b>買い物タブでリスト作成</b></p>`;
  return h;
}
function togGoods(g){ S.goodsSel[g]=!S.goodsSel[g]; save(); render(); }
function addGoods(){
  const n=prompt("ボタンにする品名（例：猫のえさ）"); if(!n||!n.trim()) return;
  if(!S.goods.includes(n.trim())) S.goods.push(n.trim());
  save(); render();
}
function delGoods(i){ const g=S.goods[i]; if(confirm(`「${g}」のボタンを消しますか？`)){ delete S.goodsSel[g]; S.goods.splice(i,1); save(); render(); } }

/* ===== 買い物リスト ===== */
let shopMode=false; /* false=チェック編集 true=店ごと買い物モード */
function aggregate(){
  const map=new Map();
  S.week.forEach(day=>day.forEach(id=>{
    const d=dish(id); if(!d) return;
    const f=S.family/(d.sv||3);
    d.ing.forEach(g=>{
      const k=g.n+"|"+g.u;
      const q=typeof g.q==="number"?g.q*f:g.q;
      if(map.has(k)){ const m=map.get(k); if(typeof q==="number"&&typeof m.q==="number") m.q+=q; }
      else map.set(k,{n:g.n, q:q, u:g.u});
    });
  }));
  const items=[...map.values()].map(x=>({n:x.n, q:roundQ(x.q,x.u), u:x.u, stock:false, done:false, store:S.storeMap[x.n]||""}));
  Object.keys(S.goodsSel).forEach(g=>{
    if(S.goodsSel[g]) items.push({n:g, q:"", u:"", stock:false, done:false, store:S.storeMap[g]||"", daily:true});
  });
  return items;
}
function roundQ(q,u){
  if(typeof q!=="number") return q;
  if(u==="g"||u==="ml") return Math.round(q/5)*5||Math.round(q)||q;
  return Math.round(q*4)/4;
}
function makeList(){
  if(S.list&&S.list.items.length&&!confirm("今のリストを作り直しますか？（チェックは消えます）")) return;
  S.list={items:aggregate(), at:Date.now()};
  shopMode=false; save(); render();
  flash("リストを作りました："+S.list.items.length+"品");
}
function rShop(){
  let h='<h2>買い物リスト</h2>';
  h+='<button class="btn wide" onclick="makeList()">📝 献立表＋日用品からリストを作る</button>';
  if(!S.list||!S.list.items.length){
    h+='<p class="note">献立表と日用品を選んでからこのボタンを押してね。</p>';
    h+=rStores();
    return h;
  }
  const items=S.list.items;
  h+=`<div class="row2"><button class="btn ${shopMode?"sub":""}" onclick="shopMode=false;render()">✔ 在庫チェック</button><button class="btn ${shopMode?"":"sub"}" onclick="shopMode=true;render()">🏪 店ごとに買い物</button></div>`;
  if(!shopMode){
    h+='<p class="note">家にあるものは「在庫あり」でグレーに。店ボタンを押すと行き先が切り替わります。</p>';
    h+='<div class="card">';
    items.forEach((it,i)=>{
      const st=it.store||"未定";
      h+=`<div class="item ${it.stock?"stocked":""}">`;
      h+=`<button class="storechip" style="background:${it.store?storeColor(it.store):"#aaa"}" onclick="cycStore(${i})">${esc(st)}</button>`;
      h+=`<div class="info"><div class="inm">${esc(it.n)}</div><div class="iq">${fmtQ(it.q)}${esc(it.u)}${it.daily?"（日用品）":""}</div></div>`;
      h+=`<button class="stockbtn ${it.stock?"on":""}" onclick="togStock(${i})">在庫${it.stock?"あり":"？"}</button>`;
      h+='</div>';
    });
    h+='</div>';
    h+='<button class="btn sub wide" onclick="addManual()">＋ リストに直接追加</button>';
  } else {
    const buy=items.filter(it=>!it.stock);
    const groups={};
    buy.forEach(it=>{ const s=it.store||"未定"; (groups[s]=groups[s]||[]).push(it); });
    const order=[...S.stores.filter(s=>groups[s]),"未定"].filter((s,i,a)=>groups[s]&&a.indexOf(s)===i);
    if(!buy.length) h+='<p class="note">買うものがありません。</p>';
    order.forEach(s=>{
      h+=`<div class="storehead" style="background:${s==="未定"?"#aaa":storeColor(s)}">${esc(s)}（${groups[s].filter(x=>!x.done).length}）</div><div class="card">`;
      groups[s].forEach(it=>{
        const i=items.indexOf(it);
        h+=`<div class="item ${it.done?"done":""}" onclick="togDone(${i})"><div class="checkbox">${it.done?"✓":""}</div><div class="info"><div class="inm">${esc(it.n)}</div><div class="iq">${fmtQ(it.q)}${esc(it.u)}</div></div></div>`;
      });
      h+='</div>';
    });
    const rest=buy.filter(x=>!x.done).length;
    h+=rest?`<p class="note">あと ${rest} 品！</p>`:'<p class="note">🎉 全部買えました！おつかれさま！</p>';
  }
  h+=rStores();
  return h;
}
function rStores(){
  let h='<h2>お店の設定</h2><div class="card"><div class="goodsgrid">';
  S.stores.forEach((s,i)=>{
    h+=`<button class="gbtn" style="border-color:${storeColor(s)};color:${storeColor(s)};font-weight:bold" onclick="renameStore(${i})">${esc(s)}</button>`;
  });
  h+='<button class="gbtn" onclick="addStore()">＋ 店を追加</button>';
  h+='</div><p class="note">店をタップで名前変更・削除。一度選んだ店は品物ごとに記憶して、次回から自動で振り分けます。</p></div>';
  return h;
}
function cycStore(i){
  const it=S.list.items[i];
  const cur=it.store?S.stores.indexOf(it.store):-1;
  it.store=cur+1>=S.stores.length?"":S.stores[cur+1];
  if(it.store) S.storeMap[it.n]=it.store; else delete S.storeMap[it.n];
  save(); render();
}
function togStock(i){ S.list.items[i].stock=!S.list.items[i].stock; save(); render(); }
function togDone(i){ S.list.items[i].done=!S.list.items[i].done; save(); render(); }
function addManual(){
  const n=prompt("追加する品名（例：ケチャップ）"); if(!n||!n.trim()) return;
  S.list.items.push({n:n.trim(), q:"", u:"", stock:false, done:false, store:S.storeMap[n.trim()]||""});
  save(); render();
}
function addStore(){
  const n=prompt("店の名前（例：セブン）"); if(!n||!n.trim()) return;
  if(!S.stores.includes(n.trim())) S.stores.push(n.trim());
  save(); render();
}
function renameStore(i){
  const old=S.stores[i];
  const n=prompt("店名を変更（空にすると削除）",old);
  if(n===null) return;
  if(!n.trim()){
    if(!confirm(`「${old}」を削除しますか？`)) return;
    S.stores.splice(i,1);
    Object.keys(S.storeMap).forEach(k=>{ if(S.storeMap[k]===old) delete S.storeMap[k]; });
    if(S.list) S.list.items.forEach(it=>{ if(it.store===old) it.store=""; });
  } else {
    S.stores[i]=n.trim();
    Object.keys(S.storeMap).forEach(k=>{ if(S.storeMap[k]===old) S.storeMap[k]=n.trim(); });
    if(S.list) S.list.items.forEach(it=>{ if(it.store===old) it.store=n.trim(); });
  }
  save(); render();
}

/* ===== バックアップ・初期化 ===== */
function exportData(){
  const a=document.createElement("a");
  a.href="data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(S));
  a.download="matomegai-backup.json"; a.click();
}
function importData(inp){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d&&d.dishes){ S=d; save(); render(); flash("読み込みました"); } else alert("ファイルが違うみたい"); }catch(e){ alert("読み込めませんでした"); } };
  r.readAsText(f);
}
function resetAll(){
  if(!confirm("すべてのデータを初期状態に戻します。自分で作った献立や設定も消えます。いいですか？")) return;
  if(!confirm("本当に初期化しますか？（バックアップ保存をおすすめします）")) return;
  S=newState(); save(); render();
}

/* ===== モーダル ===== */
function showModal(){ document.getElementById("overlay").classList.add("show"); }
function closeModal(){ document.getElementById("overlay").classList.remove("show"); }

load(); render();
</script>
</body>
