<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e8873c">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="まとめ買い">
<title>まとめ買いリスト</title>
<style>
:root{
  --or:#e8873c; --or-d:#c96f28; --or-bg:#fdf1e5;
  --bg:#faf4ec; --card:#fff; --ink:#3a3228; --sub:#9a8d7c;
  --line:#f0e5d6; --green:#5ba463; --danger:#d9534f;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{max-width:100%; overflow-x:hidden;} /* 横にはみ出してスクロールしないように */
body{margin:0; font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif; background:var(--bg); color:var(--ink); padding-bottom:calc(92px + env(safe-area-inset-bottom));}
main{max-width:640px; margin:0 auto; padding:18px 14px 10px; overflow-x:hidden;}
h2{font-size:15px; margin:14px 2px 8px; color:var(--or-d);}
/* ページ見出し */
.pagehead{display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:10px;}
.ptitle{font-size:22px; font-weight:800;}
.pill{border:1.5px solid #e8ddcb; background:#fff; border-radius:12px; padding:8px 12px; font-size:13px; font-weight:bold; color:var(--ink); cursor:pointer;}
.summary{font-size:14px; margin:0 2px 12px;}
.summary b{font-size:16px;}
/* 献立表 */
.daylist{background:var(--card); border-radius:18px; overflow:hidden; box-shadow:0 1px 5px rgba(120,90,50,.07);}
.dayrow{display:flex; align-items:center; gap:12px; padding:13px 14px; border-bottom:1px solid var(--line); cursor:pointer;}
.dayrow:last-child{border-bottom:none;}
.dcol{width:46px; text-align:center; border-right:2px solid var(--line); padding-right:10px; flex-shrink:0;}
.ddate{font-size:12px; color:var(--sub);}
.dw{font-size:18px; font-weight:800;}
.dayrow.sat .dw{color:#4a7ab5;}
.dayrow.sun .dw{color:#c05555;}
.dayrow.today .ddate,.dayrow.today .dw{color:var(--or-d);}
.dmain{flex:1; min-width:0;}
.dtitle{font-size:16px; font-weight:800;}
.dsub{font-size:13px; color:var(--sub); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.dempty{color:#c2b6a2; font-size:15px;}
.chev{color:#d5c8b2; font-size:20px;}
.dplus{width:36px; height:36px; border-radius:50%; background:#f4ece0; color:#8a7d69; font-size:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
/* 大ボタン */
.cta{display:flex; align-items:center; justify-content:center; gap:10px; width:100%; border:none; background:var(--or); color:#fff; border-radius:16px; padding:16px; font-size:16px; font-weight:800; margin-top:14px; cursor:pointer; box-shadow:0 3px 10px rgba(232,135,60,.3);}
.ctalink{text-align:center; padding:12px; font-size:14px; cursor:pointer;}
.ctalink.small{font-size:12px; color:var(--sub); padding:5px;}
/* 共通 */
.card{background:var(--card); border-radius:16px; padding:12px; margin-bottom:10px; box-shadow:0 1px 5px rgba(120,90,50,.06);}
.listcard{padding:2px 12px;}
.btn{display:inline-block; border:none; border-radius:12px; padding:10px 16px; font-size:14px; cursor:pointer; background:var(--or); color:#fff; font-weight:bold;}
.btn.sub{background:#fff; color:var(--or-d); border:1.5px solid var(--or);}
.btn.gray{background:#f0e9dd; color:#8a7d69; font-weight:normal;}
.btn.danger{background:#fff; color:var(--danger); border:1.5px solid var(--danger);}
.btn.small{padding:6px 10px; font-size:12px; border-radius:9px;}
.btn.wide{display:block; width:100%; text-align:center; margin-top:10px;}
input[type=text],input[type=number],select{font-size:15px; padding:8px; border:1.5px solid #e0d5c2; border-radius:10px; background:#fff; color:var(--ink);}
input:focus,select:focus{outline:2px solid var(--or);}
.search{width:100%; padding:11px 14px; border-radius:12px; margin-bottom:10px;}
.catbar{display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; margin-bottom:4px;}
.stickytop{position:sticky; top:0; z-index:8; background:var(--bg); margin:0 -14px 4px; padding:8px 14px 0;}
.searchrow{display:flex; gap:8px; align-items:center; margin-bottom:10px;}
.searchrow .search{flex:1; min-width:0;}
.newbtn{flex-shrink:0; border:none; background:var(--or); color:#fff; font-weight:bold; font-size:13px; padding:11px 12px; border-radius:12px; cursor:pointer;}
.fchip{flex-shrink:0; border:1.5px solid #e8ddcb; background:#fff; color:#6f6354; border-radius:20px; padding:7px 13px; font-size:13px; cursor:pointer;}
.fchip.on{background:var(--or); border-color:var(--or); color:#fff; font-weight:bold;}
.kindhead{font-size:13px; font-weight:800; color:#7d6f5c; margin:14px 2px 7px;}
.note{font-size:12px; color:var(--sub); margin:6px 2px;}
.row2{display:flex; gap:8px; margin-top:10px;}
.row2 .btn{flex:1; text-align:center;}
/* 献立一覧 */
.dishrow{display:flex; justify-content:space-between; align-items:center; padding:12px 2px; border-bottom:1px solid var(--line); cursor:pointer;}
.dishrow:last-child{border-bottom:none;}
.nm{font-size:15px; font-weight:bold;}
.ings{font-size:12px; color:var(--sub); margin-top:2px;}
.arrow{color:#d5c8b2; font-size:18px;}
.draghandle{color:#cdbfa8; font-size:19px; padding:6px 12px 6px 2px; touch-action:none; -webkit-user-select:none; user-select:none; flex-shrink:0; cursor:grab;}
.dishrow,.ingrow,.pickrow,.assignrow,.selchips .chip{-webkit-user-select:none; user-select:none;}
.dragging-active,.dragging-active *{-webkit-user-select:none !important; user-select:none !important; cursor:grabbing !important;}
/* 入力欄だけは必ず文字入力・選択できるようにする（上のuser-select:noneを打ち消す） */
input,textarea,select,[contenteditable]{-webkit-user-select:text !important; user-select:text !important; -webkit-touch-callout:default !important; cursor:auto !important;}
.chip .draghandle{color:rgba(255,255,255,.8); padding:0 4px 0 0; font-size:14px;}
.dbody{flex:1; min-width:0;}
.dishrow.dragging,.chip.dragging{opacity:.5;}
.dishrow.dragging{background:var(--or-bg); border-radius:10px;}
.catrow{display:flex; justify-content:space-between; align-items:center; gap:8px; padding:11px 2px; border-bottom:1px solid var(--line); cursor:pointer;}
.catrow:last-child{border-bottom:none;}
.catacts{display:flex; flex-wrap:wrap; gap:6px; padding:2px 2px 12px;}
.floatbar{position:fixed; left:0; right:0; bottom:calc(60px + env(safe-area-inset-bottom)); z-index:9; max-width:640px; margin:0 auto; padding:8px 12px; display:flex; gap:10px; align-items:center; background:rgba(250,244,236,.97); border-top:1px solid var(--line); box-shadow:0 -3px 10px rgba(0,0,0,.06);}
.fbcount{font-size:12px; color:var(--or-d); font-weight:bold; text-align:center; line-height:1.2; flex-shrink:0;}
.dishrow.selrow{background:#eef7ef; border-radius:10px;}
.dishrow.selrow .nm{color:var(--green);}
.ckb2{width:24px; height:24px; border:2px solid #d9cdb8; border-radius:6px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; flex-shrink:0;}
.weeknav{display:flex; align-items:center; gap:10px; margin:2px 0 8px;}
.wnav{border:1px solid var(--line); background:#fff; width:44px; height:44px; border-radius:12px; font-size:16px; color:var(--or-d); cursor:pointer; flex-shrink:0;}
.wlabel{flex:1; text-align:center;}
.wlabel b{font-size:16px;}
.wlabel span{display:block; font-size:12px; color:var(--sub); margin-top:1px;}
/* 朝・昼・夜は縦に3段（スマホで読みやすい） */
.mealcols{display:flex; flex-direction:column; gap:7px;}
.mealcol{display:flex; align-items:flex-start; gap:9px; min-width:0; padding-left:8px; border-left:3px solid;}
.mealcol .mbody{flex:1; min-width:0;}
.mealcol .mlabel{font-size:11px; font-weight:bold; letter-spacing:.5px; width:24px; flex-shrink:0; padding-top:2px;}
.mealcol .mnames{font-size:12.5px; line-height:1.35; color:var(--ink); word-break:break-word; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
.mealcol .mnames.big{font-size:14px; font-weight:bold; -webkit-line-clamp:1;}
.mealcol .mnames.empty{color:#c9bda9; font-size:15px;}
.mealcol .more{font-size:10.5px; color:var(--sub); margin-top:2px;}
.summaryrow{display:flex; align-items:center; justify-content:space-between; gap:8px; margin:0 2px 12px; flex-wrap:wrap;}
.summaryrow .summary{flex:1 1 auto; min-width:0;}
.viewtog{border:1.5px solid #e8ddcb; background:#fff; border-radius:10px; padding:6px 10px; font-size:12px; font-weight:bold; color:var(--or-d); cursor:pointer; flex-shrink:0;}
.mealtoggle{display:flex; align-items:center; gap:6px; margin:0 2px 12px; flex-wrap:wrap;}
.mtlabel{font-size:11px; color:var(--sub); flex-shrink:0;}
.mtchip{border:1.5px solid #e2d6c2; background:#fff; color:#b3a696; border-radius:14px; padding:6px 11px; font-size:12.5px; font-weight:bold; cursor:pointer;}
.mtchip.b.on{background:#e8873c; border-color:#e8873c; color:#fff;}
.mtchip.l.on{background:#e0b23c; border-color:#e0b23c; color:#fff;}
.mtchip.d.on{background:#4a7ab5; border-color:#4a7ab5; color:#fff;}
.mealcol.b{border-color:#e8873c;} .mealcol.b .mlabel{color:#c96f28;}
.mealcol.l{border-color:#e0b23c;} .mealcol.l .mlabel{color:#a37c12;}
.mealcol.d{border-color:#4a7ab5;} .mealcol.d .mlabel{color:#37608f;}
/* 夜＝その日のメイン。淡い青帯＋大きめ文字で目立たせる（複数食事のときだけ） */
.mealcols .mealcol.d{background:#eef3f9; border-radius:0 10px 10px 0; padding:6px 9px 6px 8px; margin-left:0;}
.mealcols .mealcol.d .mnames.big{font-size:19px; line-height:1.3;}
.mealcols .mealcol.d .mnames{font-size:14px;}
.mealcols .mealcol.d .mlabel{font-size:12px;}
.mealpick{background:#f6efe4; border-radius:14px; padding:10px 12px; margin-bottom:12px;}
.mplabel{font-size:12px; color:var(--sub); font-weight:bold; margin-bottom:8px;}
.mprow{display:flex; gap:8px;}
.mchip{flex:1; border:2px solid #ddd0bb; background:#fff; color:var(--sub); border-radius:12px; padding:11px 4px; font-size:14px; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:4px;}
.mchip .mcnt{background:rgba(0,0,0,.12); border-radius:9px; font-size:11px; padding:1px 6px;}
.mchip.b.on{background:#e8873c; border-color:#e8873c; color:#fff;}
.mchip.l.on{background:#e0b23c; border-color:#e0b23c; color:#fff;}
.mchip.d.on{background:#4a7ab5; border-color:#4a7ab5; color:#fff;}
.addingto{font-size:13px; font-weight:bold; padding:8px 12px; border-radius:10px; margin-bottom:8px; display:inline-block;}
.addingto.b{background:#fdf1e5; color:#c96f28;}
.addingto.l{background:#fbf3dd; color:#a37c12;}
.addingto.d{background:#eaf1f9; color:#37608f;}
.listweek{background:#f2ece2; color:var(--ink); font-size:13px; font-weight:bold; padding:9px 12px; border-radius:10px; margin-bottom:10px;}
.listweek.other{background:#fdf1e5; color:#c96f28;}
.lwnote{display:block; font-size:11px; font-weight:normal; margin-top:2px;}
.edcal{background:#f7f1e7; border-radius:14px; padding:10px;}
.edcalhead{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; font-size:14px;}
.edarrow{border:1px solid var(--line); background:#fff; width:34px; height:34px; border-radius:10px; color:var(--or-d); cursor:pointer;}
.edmeals{display:flex; gap:6px; margin-bottom:8px;}
.edmeals .mchip{flex:1;}
.eddays{display:flex; gap:4px;}
.edday{flex:1; min-width:0; border:1.5px solid #e2d6c2; background:#fff; border-radius:10px; padding:7px 2px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:1px;}
.edday .edw{font-size:13px; font-weight:bold; color:var(--ink);}
.edday .edd{font-size:9px; color:var(--sub);}
.edday .edplus{font-size:13px; color:var(--or);}
.edday .edchk{font-size:12px; color:#fff; background:var(--green); border-radius:8px; padding:0 5px; font-weight:bold;}
.edday.has{border-color:var(--green); background:#eef7ef;}
.edday.today{box-shadow:0 0 0 2px var(--or-bg);}
.edday.today .edw{color:var(--or-d);}
.edtap{display:flex; flex-direction:column; align-items:center; cursor:pointer;}
.edrow2{display:flex; align-items:center; justify-content:center; gap:3px; margin-top:3px;}
.edminus{color:var(--danger); font-weight:bold; font-size:15px; padding:1px 5px; border-radius:6px; background:#fdecec; cursor:pointer;}
.edplusS{color:var(--or); font-weight:bold; font-size:14px; padding:1px 5px; border-radius:6px; background:var(--or-bg); cursor:pointer;}
/* 一覧行の「−」と個数バッジ */
.minusbtn{width:30px; height:30px; border-radius:50%; background:#fdecec; color:var(--danger); font-size:18px; font-weight:bold; display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer;}
.cntbadge{min-width:22px; text-align:center; font-size:13px; font-weight:bold; color:var(--green);}
.qtylabel{min-width:46px; text-align:center; font-size:14px; font-weight:bold; color:var(--green);}
.catrow.sel,.pickrow.sel{background:#eef7ef; border-radius:10px;}
.iq.editable{cursor:pointer; border:1px dashed #d9cdb8; border-radius:8px; padding:3px 7px;}
/* 買い物リストの2段表示 */
.item2{padding:11px 2px; border-bottom:1px solid var(--line);}
.item2:last-child{border-bottom:none;}
.i2top{display:flex; align-items:center; gap:10px;}
.i2name{flex:1; min-width:0; font-size:16px; font-weight:600; cursor:pointer;}
.i2top .iq{font-size:14px; color:var(--ink); flex-shrink:0;}
.i2bot{display:flex; align-items:center; gap:8px; margin:7px 0 0 34px; flex-wrap:wrap;}
.needq{font-size:11.5px; color:var(--sub);}
.item2.done .i2name,.item2.done .iq{text-decoration:line-through; color:#b7ab9a;}
.item2.stocked .i2name,.item2.stocked .iq{text-decoration:line-through; color:#c4b8a6;}
.dishrow.selrow .ckb2{background:var(--green); border-color:var(--green);}
/* 日用品 */
.goodsgrid{display:flex; flex-wrap:wrap; gap:8px;}
.gbtn{border:1.5px solid #eadfce; background:#fff; border-radius:12px; padding:10px 12px; font-size:13px; cursor:pointer; color:#5c5245;}
.gbtn.sel{background:var(--or-bg); border-color:var(--or); color:var(--or-d); font-weight:bold;}
.gchk{display:inline-flex; align-items:center; justify-content:center; width:17px; height:17px; margin-left:6px; border-radius:50%; background:var(--or); color:#fff; font-size:11px;}
.gbtn .del{margin-left:6px; color:var(--danger); font-weight:bold;}
/* 買い物リスト */
.seg{display:flex; background:#fff; border:1.5px solid #e8ddcb; border-radius:12px; padding:4px; margin-bottom:12px;}
.seg button{flex:1; border:none; background:none; border-radius:9px; padding:9px 0; font-size:13px; font-weight:bold; color:#8d8172; cursor:pointer;}
.seg button.on{background:var(--or); color:#fff;}
.pmeta{font-size:13px; color:var(--sub); margin:2px 2px 6px;}
.pmeta b{color:var(--ink); font-size:15px;}
.pbar{height:7px; border-radius:4px; background:#f0e4d3; margin:2px 0 8px; overflow:hidden;}
.pfill{height:100%; background:var(--or); border-radius:4px;}
.item{display:flex; align-items:center; gap:9px; padding:10px 2px; border-bottom:1px solid var(--line);}
.item:last-child{border-bottom:none;}
.ckb{width:26px; height:26px; border:2px solid #ddd0bb; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; cursor:pointer;}
.item.done .ckb{background:var(--green); border-color:var(--green);}
.info{flex:1; min-width:0;}
.inm{font-size:15px; font-weight:600;}
.iq{font-size:13px; color:var(--sub); flex-shrink:0;}
.item.stocked .inm,.item.stocked .iq,.item.done .inm,.item.done .iq{color:#c9bda9; text-decoration:line-through;}
.storechip{border:none; border-radius:9px; padding:6px 8px; font-size:11px; font-weight:bold; color:#fff; flex-shrink:0; min-width:46px; cursor:pointer;}
.stockbtn{border:1.5px solid #eadfce; background:#fff; border-radius:10px; padding:6px 8px; font-size:11px; color:#b3a692; cursor:pointer; flex-shrink:0;}
.stockbtn.on{background:var(--or-bg); border-color:var(--or); color:var(--or-d); font-weight:bold;}
.linkbtn{font-size:13px; font-weight:bold; color:var(--or-d); cursor:pointer;}
.storebtn{border:1.5px solid var(--or); background:#fff; color:var(--or-d); border-radius:10px; padding:6px 9px; font-size:12px; font-weight:bold; flex-shrink:0; cursor:pointer; white-space:nowrap;}
.storebtn.unset{border-color:#d8ccb8; color:#a2967f;}
.radiorow{display:flex; align-items:center; gap:12px; padding:11px 6px; font-size:15px; cursor:pointer; border-bottom:1px solid var(--line);}
.radiorow:last-child{border-bottom:none;}
.radio{width:20px; height:20px; border:2px solid #ddd0bb; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--or); flex-shrink:0;}
.radiorow.on .radio{border-color:var(--or);}
.item select{font-size:13px; padding:6px; max-width:150px;}
.assignrow{padding:10px 4px; border-bottom:1px solid var(--line);}
.assignrow:last-child{border-bottom:none;}
.arname{font-size:14px; font-weight:600; margin-bottom:6px;}
.arq{font-size:12px; color:var(--sub); font-weight:normal; margin-left:6px;}
.aropts{display:flex; flex-wrap:wrap; gap:6px;}
.sopt{border:1.5px solid #ddd0bb; background:#fff; color:var(--sub); border-radius:16px; padding:6px 12px; font-size:13px; font-weight:600; cursor:pointer;}
/* モーダル */
#overlay{position:fixed; inset:0; background:rgba(60,45,25,.45); z-index:20; display:none; align-items:flex-end; justify-content:center;}
#overlay.show{display:flex;}
#modal{background:#fff; width:100%; max-width:640px; max-height:88vh; min-height:0; border-radius:22px 22px 0 0; padding:18px 16px; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain;}
.mhead{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.mhead.back{justify-content:flex-start; gap:12px;}
.mhead b{font-size:16px;}
.backbtn{border:none; background:#f4ece0; color:var(--ink); font-size:19px; width:40px; height:40px; border-radius:12px; cursor:pointer; flex-shrink:0;}
.selbox{background:#eef7ef; border:1px solid #cfe6d3; border-radius:12px; padding:10px; margin-bottom:12px;}
.selbox .selttl{font-size:12px; color:var(--green); font-weight:bold; margin-bottom:8px;}
.selrows{display:flex; flex-direction:column; gap:8px;}
.selbig{display:flex; align-items:center; gap:10px; background:#fff; border:1px solid #cfe6d3; border-radius:12px; padding:12px 12px;}
.selbig .draghandle{color:#9cc7a3; padding:6px 4px 6px 0;}
.sbmain{flex:1; min-width:0; cursor:pointer;}
.sbname{font-size:17px; font-weight:bold; color:#2f7d3a; line-height:1.25;}
.sbig{font-size:12px; color:var(--sub); margin-top:3px;}
.sbx{color:#c2ddc6; font-size:22px; font-weight:bold; cursor:pointer; padding:2px 4px; flex-shrink:0;}
.sdrow{display:flex; justify-content:space-between; padding:6px 2px; border-bottom:1px solid var(--line); font-size:14px;}
.sdrow:last-child{border-bottom:none;}
.sdq{color:var(--sub); font-size:13px;}
.selchips{display:flex; flex-wrap:wrap; gap:7px;}
.chip{background:var(--green); border:none; color:#fff; border-radius:16px; padding:7px 11px; font-size:14px; font-weight:600; display:inline-flex; align-items:center; gap:7px;}
.chip .x{color:#fff; opacity:.85; font-weight:bold; cursor:pointer; padding:0 2px 0 3px; border-left:1px solid rgba(255,255,255,.4);}
.pickrow{display:flex; justify-content:space-between; align-items:center; gap:8px; padding:11px 2px; border-bottom:1px solid var(--line); cursor:pointer;}
.pickrow.sel{background:#eef7ef; border-radius:10px; padding:11px 8px; border-bottom:1px solid transparent;}
.pnm{font-size:15px; font-weight:600;}
.pickrow.sel .pnm{color:var(--green);}
.pig{font-size:12px; color:var(--sub); margin-top:2px;}
.paddbtn{width:30px; height:30px; border-radius:50%; background:var(--or); color:#fff; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.paddbtn.on{background:var(--green); font-size:13px; font-weight:bold;}
.ingrow{display:flex; gap:6px; margin-bottom:6px;}
.ingrow input.n{flex:1; min-width:0;}
.ingrow input.q{width:64px;}
.ingrow input.u{width:64px;}
.ingrow .rm{border:none; background:none; color:var(--danger); font-size:18px; cursor:pointer; padding:0 4px;}

nav{position:fixed; bottom:0; left:0; right:0; z-index:10; display:flex; background:#fff; border-top:1px solid var(--line); padding:6px 8px calc(10px + env(safe-area-inset-bottom));}
nav button{flex:1; border:none; background:none; font-size:11px; color:#a2967f; cursor:pointer; font-weight:600;}
nav button .ic{display:block; font-size:20px; margin:0 auto 3px; padding:3px 0; border-radius:12px; width:54px;}
nav button.on{color:var(--or-d); font-weight:bold;}
nav button.on .ic{background:#f7e7d4;}
.flash{position:fixed; bottom:86px; left:50%; transform:translateX(-50%); background:#3a3228; color:#fff; padding:8px 18px; border-radius:20px; font-size:13px; z-index:30; opacity:0; transition:opacity .3s; pointer-events:none; max-width:90%; text-align:center;}
.flash.show{opacity:.93;}

  /* 定番の分類変更を移行：朝ごはん廃止／食品・調味料とおやつ・飲み物を分割 */
  Object.keys(S.goodsCatMap).forEach(k=>{
    const v=S.goodsCatMap[k];
    if(v==="朝ごはん"){ S.goodsCatMap[k]="食品"; return; }
    if(v==="食品・調味料"||v==="おやつ・飲み物"){
      const mapped=CAT2GOODS[catInfo(k).cat];
      S.goodsCatMap[k]=mapped||(v==="食品・調味料"?"食品":"おやつ");
    }
  });
  if(!S.pantryList) S.pantryList=Object.keys(PANTRY).map(n=>({n:n, q:PANTRY[n].q, u:PANTRY[n].u}));
  if(!S.excludeList) S.excludeList=[{n:"米", q:1, u:"袋"}];
  if(!S.meals) S.meals={b:false, l:false, d:true};
  /* 旧形式（1日＝配列）を朝昼夜スロットへ移行。既存の献立はすべて「夜」に入る */
  Object.keys(S.plans||{}).forEach(k=>{
    S.plans[k]=(S.plans[k]||[]).map(day=>{
      if(Array.isArray(day)) return {b:[], l:[], d:day};
      return {b:day.b||[], l:day.l||[], d:day.d||[]};
    });
    while(S.plans[k].length<7) S.plans[k].push(emptyDay());
  });
  if(!S.cats||!S.cats.length) S.cats=CATS.slice();
  else if(CATS_OLDS.some(o=>S.cats.join(",")===o.join(","))) S.cats=CATS.slice(); /* 未編集なら新しい順番に更新 */
  if(!S.plans){ S.plans={}; if(Array.isArray(S.week)) S.plans[keyOf(mondayOf(new Date()))]=S.week; }
  delete S.week;
  GOODS_NEW.forEach(g=>{ if(!S.goods.includes(g)) S.goods.push(g); });
  S.dishes.forEach(d=>{ if(!d.sv) d.sv=3; });
  /* テンプレ側で増えた材料を、保存済みの献立にも補充（ユーザーの編集は触らない） */
  SEED.forEach((sd,i)=>{
    const d=S.dishes.find(x=>x.id==="s"+i&&x.name===sd[1]);
    if(!d) return;
    sd[2].forEach(g=>{ if(!d.ing.some(x=>x.n===g[0])) d.ing.push({n:g[0], q:g[1], u:g[2]}); });
  });
  /* テンプレ側で新しく増えた献立を追加（既存ユーザーにも届くように） */
  SEED.forEach((sd,i)=>{
    if(S.dishes.some(x=>x.id==="s"+i)) return;
    S.dishes.push({id:"s"+i, cat:sd[0], name:sd[1], sv:3, ing:sd[2].map(x=>({n:x[0],q:x[1],u:x[2]}))});
  });
}

/* 日本語変換（IME）中は再描画しない。変換が壊れて文字が打てなくなるため */
let imeComposing=false, deferTimer=null, deferFn=null;
document.addEventListener("compositionstart",function(){ imeComposing=true; });
document.addEventListener("compositionend",function(){
  imeComposing=false;
  if(deferFn){ const f=deferFn; deferFn=null; clearTimeout(deferTimer); setTimeout(f,0); }
});
/* 入力のたびに走る再描画を、変換確定後・少し待ってからにまとめる */
function deferRender(fn){
  deferFn=fn;
  clearTimeout(deferTimer);
  deferTimer=setTimeout(function(){
    if(imeComposing) return;      /* 変換中なら compositionend 側で実行する */
    const f=deferFn; deferFn=null;
    if(f) f();
  },220);
}
/* 再描画してもカーソル位置を保つ（検索欄で1文字ずつ切れないように） */
function setHTML(el,html){
  const a=document.activeElement;
  const id=(a&&a.id)||"", ss=(a&&a.selectionStart), se=(a&&a.selectionEnd);
  el.innerHTML=html;
  if(id){
    const b=document.getElementById(id);
    if(b&&b!==document.activeElement){
      b.focus({preventScroll:true});
      try{ if(ss!=null) b.setSelectionRange(ss,se); }catch(_){}
    }
  }
}
function render(){
  document.body.classList.remove("dragging-active"); /* 万一ドラッグ状態が残っても解除 */
  ["week","dish","goods","shop"].forEach(t=>document.getElementById("nav-"+t).classList.toggle("on",t===TAB));
  const v=document.getElementById("view");
  if(TAB==="week"){ setHTML(v,rWeek()); enableSort(v.querySelector(".daylist"), commitDayOrder, false); }
  else if(TAB==="dish"){ setHTML(v,rDish()); enableSort(v.querySelector(".listcard"), commitDishOrder, false); }
  else if(TAB==="goods"){ setHTML(v,rGoods()); enableSort(v.querySelector(".listcard"), commitGoodsOrder, false); }
  else setHTML(v,rShop());
}
/* 指ドラッグで並べ替え（ポインタ＝タッチ/マウス両対応）。horiz=true は横並びチップ用 */
function enableSort(container, commit, horiz){
  if(!container) return;
  container.querySelectorAll("[data-sort]").forEach(handle=>{
    handle.addEventListener("pointerdown", function(e){
      e.preventDefault(); e.stopPropagation();
      const item=handle.closest("[data-id]"); if(!item) return;
      item.classList.add("dragging");
      document.body.classList.add("dragging-active");
      if(window.getSelection){ try{ window.getSelection().removeAllRanges(); }catch(_){} }
      function move(ev){
        if(ev.cancelable) ev.preventDefault();
        const others=[...container.querySelectorAll("[data-id]")].filter(x=>x!==item);
        let target=null;
        for(const o of others){
          const r=o.getBoundingClientRect();
          if(horiz){
            const past=(ev.clientY>r.bottom)||(ev.clientY>=r.top&&ev.clientX>r.left+r.width/2);
            if(!past){ target=o; break; }
          } else {
            if(ev.clientY<r.top+r.height/2){ target=o; break; }
          }
        }
        if(target) container.insertBefore(item,target); else container.appendChild(item);
      }
      function up(){
        window.removeEventListener("pointermove",move);
        window.removeEventListener("pointerup",up);
        window.removeEventListener("pointercancel",up);
        item.classList.remove("dragging");
        document.body.classList.remove("dragging-active");
        commit([...container.querySelectorAll("[data-id]")].map(x=>x.getAttribute("data-id")));
      }
      window.addEventListener("pointermove",move,{passive:false});
      window.addEventListener("pointerup",up);
      window.addEventListener("pointercancel",up);
    });
  });
}

/* 献立変更をリストに差分反映（購入済み・店・在庫の状態は保持） */
function syncList(ag){
  const key=x=>x.n+"|"+(x.u||"");
  const agMap=new Map(ag.filter(x=>!x.daily).map(x=>[key(x),x]));
  let added=0, removed=0, updated=0;
  S.list.items=S.list.items.filter(it=>{
    if(it.daily||it.manual||it.pantry) return true;    /* 日用品・手動追加・常備品は触らない */
    const nw=agMap.get(key(it));
    if(nw){                                            /* 引き続き必要 → 数量だけ最新に */
      if(typeof nw.q==="number"&&it.q!==nw.q){ it.q=nw.q; updated++; }
      agMap.delete(key(it));
      return true;
    }
    if(it.done) return true;                           /* 購入済みは勝手に消さない */
    removed++; return false;                           /* 未購入で不要になった → 削除 */
  });
  agMap.forEach(nw=>{                                  /* 新しく必要 → 自動追加（定番と同名なら統合済みなのでスキップ） */
    if(S.list.items.some(it=>it.daily&&it.n===nw.n)) return;
    S.list.items.push(nw); added++;
  });
  S.goods.forEach(g=>{                                 /* 定番（選択中＋⭐毎回）が消えていたら補充 */
    if(!S.goodsSel[g]&&!S.goodsStar[g]) return;
    if(S.list.items.some(it=>it.n===g)) return;
    S.list.items.push({n:g, q:goodsQtyOf(g), u:goodsUnitOf(g), stock:false, done:false, store:S.storeMap[g]||"", daily:true}); added++;
  });
  /* 常備品・除外品コーナーも今週の献立に合わせて更新（「買う」の選択は保持） */
  const need=pantryNeeded();
  const syncCorner=(key,names)=>{
    const old=S.list[key]||[];
    S.list[key]=names.map(n=>{ const o=old.find(x=>x.n===n); return {n:n, buy:o?o.buy:false}; });
    old.forEach(o=>{
      if(o.buy&&!names.includes(o.n)){
        const idx=S.list.items.findIndex(it=>it.pantry&&it.n===o.n&&!it.done);
        if(idx>=0){ S.list.items.splice(idx,1); removed++; }
      }
    });
  };
  syncCorner("pantry", need.names);
  syncCorner("excluded", need.excludedNames);
  return {added, removed, updated};
}

function togCorner(key,idx){
  const p=S.list[key][idx]; if(!p) return;
  if(!p.buy){
    p.buy=true;
    const d=(key==="excluded"?excludeUnit(p.n):pantryUnit(p.n))||{q:1,u:"個"};
    S.list.items.push({n:p.n, q:d.q, u:d.u, stock:false, done:false, store:S.storeMap[p.n]||"", pantry:true});
    flash(p.n+" "+fmtQ(d.q)+d.u+" をリストに追加");

    if(i>=0) S.list.items.splice(i,1);
  }
  save(); render();
}

    h+=`<div class="addingto ${pickMeal}">↓ 下から選ぶと「${cur.icon} ${cur.label}」に入ります</div>`;
  }
  h+=`<input type="text" class="search" id="sPick" placeholder="🔍 料理名を検索" value="${esc(pickSearch)}" oninput="pickSearch=this.value;deferRender(renderPicker)">`;
  h+='<div class="catbar">';
  h+=`<button class="fchip ${pickCat===""?"on":""}" onclick="pickCat='';renderPicker()">すべて</button>`;
  S.cats.forEach(c=>{ h+=`<button class="fchip ${pickCat===c?"on":""}" onclick="pickCat='${esc(c)}';renderPicker()">${esc(c)}</button>`; });
  h+='</div>';
  const q=pickSearch.trim();
  let list;
  if(q) list=S.dishes.filter(d=>d.name.includes(q)||d.ing.some(i=>i.n.includes(q)));
  else if(pickCat==="") list=S.dishes;
  else list=S.dishes.filter(d=>d.cat===pickCat);
  if(!list.length) h+='<p class="note">見つかりません</p>';
  list.forEach(d=>{
    const ig=d.ing.slice(0,3).map(x=>x.n).join("・");
    const cnt=slot.filter(x=>x===d.id).length;
    const sel=cnt>0;
    h+=`<div class="pickrow ${sel?"sel":""}"><div class="dbody" onclick="pickAdd('${d.id}')"><div class="pnm">${esc(d.name)}</div><div class="pig">${esc(ig)}${d.ing.length>3?" など":""}</div></div>`;
    if(sel) h+=`<span class="minusbtn" onclick="event.stopPropagation();pickRemoveOne('${d.id}')">−</span><span class="cntbadge">${cnt}</span>`;
    h+=`<span class="paddbtn" onclick="event.stopPropagation();pickAdd('${d.id}')">＋</span></div>`;
  });
  /* 献立に無くても、カタログの品物なら「そのまま」1品として追加できる */
  if(q){
    const exists=S.dishes.some(d=>d.name===q);
    const hits=allCatalog().filter(x=>(x.name===q)||x.name.includes(q)||x.alias.includes(q)).slice(0,6);
    const news=hits.filter(x=>!S.dishes.some(d=>d.name===x.name));
    if(news.length&&!exists){
      h+='<div class="kindhead">そのまま食べる物として追加</div><div class="card listcard">';
      news.forEach(x=>{
        h+=`<div class="pickrow"><div class="dbody" onclick="addRawDish('${esc(x.name)}','${esc(x.unit||"")}')"><div class="pnm">${esc(x.name)}</div><div class="pig">${esc(x.cat)}・切って出すだけ</div></div><span class="paddbtn">＋</span></div>`;
      });
      h+='</div>';
    }
  }
  setHTML(document.getElementById("modal"),h);
  enableSort(document.querySelector("#modal .selrows"), commitWeekOrder, false);
}
function rmPick(j){ curWeek(true)[pickDay][pickMeal].splice(j,1); if(!curWeek()[pickDay][pickMeal].length) pickDetail=""; save(); renderPicker(); }
/* カタログの品物を「そのまま食べる」1品の献立にして、その日に入れる */
function addRawDish(name,unit){
  let d=S.dishes.find(x=>x.name===name);
  if(!d){
    d={id:"u"+(S.nextId++), name:name, cat:"そのまま", sv:S.family||3, url:"", memo:"", ing:[{n:name, q:1, u:unit||""}]};
    S.dishes.push(d);
  }
  curWeek(true)[pickDay][pickMeal].push(d.id);
  S.recent=[d.id,...S.recent.filter(x=>x!==d.id)].slice(0,10);
  pickSearch="";
  save(); renderPicker(); flash(name+" を追加（献立にも登録しました）");
}
function pickRemoveOne(id){
  const slot=curWeek(true)[pickDay][pickMeal];
  const i=slot.lastIndexOf(id);
  if(i>=0){ slot.splice(i,1); flash(dish(id).name+" を1つ減らしました"); }
  if(!slot.length) pickDetail="";
  save(); renderPicker();
}
function pickAdd(id){
  curWeek(true)[pickDay][pickMeal].push(id);
  S.recent=[id,...S.recent.filter(x=>x!==id)].slice(0,10);
  const cur=MEALS.find(m=>m.k===pickMeal);
  save(); flash(dish(id).name+" を"+(onMeals().length>1?cur.label+"に":"")+"追加"); renderPicker();
}

/* 献立エディタ */
let editTarget=null, edWeekOff=0, edMeal="d";
function openEditor(id){
  if(id){ const d=dish(id); editTarget={id:id, name:d.name, cat:d.cat, sv:d.sv||3, url:d.url||"", memo:d.memo||"", ing:d.ing.map(x=>({...x}))}; }
  else editTarget={id:null, name:"", cat:dishCat||"主食", sv:S.family||3, url:"", memo:"", ing:[{n:"",q:"",u:""}]};
  edWeekOff=weekOffset; edMeal=defaultMeal();
  showModal(); renderEditor();
}
/* 編集画面から直接カレンダーに入れる */
function edShiftWeek(d){ edWeekOff+=d; renderEditor(); }
function edSetMeal(k){ edMeal=k; renderEditor(); }
function regIngToCatalog(i){
  const g=editTarget.ing[i]; if(!g||!g.n.trim()) return;
  const nm=g.n.trim();
  if(allCatalog().some(x=>x.name===nm)){ flash("すでにカタログにあります"); return; }
  S.customCatalog.push({name:nm, alias:"", unit:(g.u||"").trim(), cat:"その他"});
  save(); renderEditor(); flash(nm+" をカタログに登録しました");
}
function edRemoveFromDay(i){
  const id=editTarget.id; if(!id) return;
  const slot=weekAt(keyAt(edWeekOff),true)[i][edMeal];
  const j=slot.lastIndexOf(id);
  if(j>=0){
    slot.splice(j,1);
    const dt=datesAt(edWeekOff)[i];
    save(); renderEditor();
    flash(`${dt.getMonth()+1}/${dt.getDate()}(${DAYS[i]}) から1つ減らしました`);
  }
}
function edAddToDay(i){
  const id=editTarget.id; if(!id) return;
  weekAt(keyAt(edWeekOff),true)[i][edMeal].push(id);
  S.recent=[id,...S.recent.filter(x=>x!==id)].slice(0,10);
  const dt=datesAt(edWeekOff)[i];
  const ml=MEALS.find(m=>m.k===edMeal);
  save(); renderEditor();
  flash(`${dt.getMonth()+1}/${dt.getDate()}(${DAYS[i]})${onMeals().length>1?"の"+ml.label:""} に追加`);
}
function edCalendar(){
  if(!editTarget.id) return '';
  const ms=onMeals(); const dates=datesAt(edWeekOff); const wk=weekAt(keyAt(edWeekOff));
  const todayStr=new Date().toDateString();
  let h='<div class="kindhead" style="margin-top:16px">この献立を献立表に入れる</div>';
  h+='<div class="edcal">';
  h+='<div class="edcalhead"><button class="edarrow" onclick="edShiftWeek(-1)">◀</button>';
  h+=`<b>${edWeekOff===0?"今週":edWeekOff===1?"来週":edWeekOff===-1?"先週":weekRangeLabel(keyAt(edWeekOff))}</b>`;
  h+='<button class="edarrow" onclick="edShiftWeek(1)">▶</button></div>';
  if(ms.length>1){
    h+='<div class="edmeals">';
    ms.forEach(m=>{ h+=`<button class="mchip ${m.k} ${edMeal===m.k?"on":""}" style="padding:7px 4px;font-size:13px" onclick="edSetMeal('${m.k}')">${m.icon} ${m.label}</button>`; });
    h+='</div>';
  }
  h+='<div class="eddays">';
  DAYS.forEach((w,i)=>{
    const dt=dates[i];
    const has=(wk[i][edMeal]||[]).filter(x=>x===editTarget.id).length;
    const isT=dt.toDateString()===todayStr;
    h+=`<div class="edday ${has?"has":""} ${isT?"today":""}"><div class="edtap" onclick="edAddToDay(${i})"><span class="edw">${w}</span><span class="edd">${dt.getMonth()+1}/${dt.getDate()}</span></div>`;
    if(has) h+=`<div class="edrow2"><span class="edminus" onclick="edRemoveFromDay(${i})">−</span><span class="edchk">${has}</span><span class="edplusS" onclick="edAddToDay(${i})">＋</span></div>`;
    else h+=`<div class="edrow2"><span class="edplus" onclick="edAddToDay(${i})">＋</span></div>`;
    h+='</div>';
  });
  h+='</div><p class="note" style="margin:6px 0 0">曜日をタップすると、その日に追加されます。</p></div>';
  return h;
}
function renderEditor(){
  const t=editTarget;
  let h=`<div class="mhead back"><button class="backbtn" onclick="closeModal()">←</button><b>${t.id?"献立を編集":"新しい献立"}</b></div>`;
  h+=`<div style="display:flex;gap:8px;margin-bottom:10px;"><input type="text" style="flex:1;min-width:0" placeholder="料理名" value="${esc(t.name)}" oninput="editTarget.name=this.value">`;
  h+='<select onchange="editTarget.cat=this.value">';
  S.cats.forEach(c=>{ h+=`<option ${c===t.cat?"selected":""}>${esc(c)}</option>`; });
  h+='</select></div>';
  h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:14px;">下の分量は<input type="number" min="1" style="width:60px" value="${t.sv}" oninput="editTarget.sv=this.value">人分</div>`;
  h+='<div style="font-size:12px;color:#9a8d7c;margin-bottom:4px;">材料　／　数量　／　単位（個・g・本など）</div>';
  t.ing.forEach((g,i)=>{
    h+=`<div class="ingrow"><input class="n" type="text" placeholder="材料名" value="${esc(g.n)}" oninput="editTarget.ing[${i}].n=this.value">`;
    h+=`<input class="q" type="number" step="any" placeholder="数" value="${g.q}" oninput="editTarget.ing[${i}].q=this.value">`;
    h+=`<input class="u" type="text" placeholder="単位" value="${esc(g.u)}" oninput="editTarget.ing[${i}].u=this.value">`;
    h+=`<button class="rm" onclick="editTarget.ing.splice(${i},1);renderEditor()">✕</button></div>`;
    /* カタログに無い材料は、その場で登録できるようにする */
    if(g.n&&g.n.trim()&&!allCatalog().some(x=>x.name===g.n.trim())){
      h+=`<div style="margin:-2px 0 8px 2px"><button class="btn sub small" onclick="regIngToCatalog(${i})">📖「${esc(g.n.trim())}」をカタログに登録</button></div>`;
    }
  });
  h+='<div class="row2" style="margin-top:4px"><button class="btn sub small" onclick="openCatalogForIng()">📖 カタログから選ぶ</button><button class="btn sub small" onclick="editTarget.ing.push({n:\'\',q:\'\',u:\'\'});renderEditor()">＋ 手入力で追加</button></div>';
  h+=`<div style="margin-top:14px"><input type="text" style="width:100%" placeholder="参考レシピのURL（任意）" value="${esc(t.url)}" oninput="editTarget.url=this.value"></div>`;
  if(t.url&&/^https?:\/\//.test(t.url.trim())) h+=`<div style="margin-top:6px"><a href="${esc(t.url.trim())}" target="_blank" rel="noopener" class="linkbtn">🔗 レシピを開く</a></div>`;
  h+=`<div style="margin-top:8px"><input type="text" style="width:100%" placeholder="ひとことメモ（任意：味付けのコツなど）" value="${esc(t.memo)}" oninput="editTarget.memo=this.value"></div>`;
  h+='<div class="row2"><button class="btn" onclick="saveDish()">保存</button>';
  if(t.id) h+='<button class="btn sub" onclick="copyDish()">コピーを作る</button><button class="btn danger" onclick="delDish()">削除</button>';
  h+='</div>';
  h+=edCalendar();
  setHTML(document.getElementById("modal"),h);
}
function cleanIng(){ return editTarget.ing.filter(g=>g.n.trim()).map(g=>({n:g.n.trim(), q:g.q===""?"":Number(g.q), u:g.u.trim()})); }
function saveDish(){
  const t=editTarget;
  if(!t.name.trim()){ alert("料理名を入れてください"); return; }
  const sv=Math.max(1,Number(t.sv)||3);
  const ing=cleanIng();
  /* カタログに無い材料があれば、ついでに登録するか聞く */
  const known=allCatalog().map(x=>x.name);
  const unknown=ing.filter(g=>known.indexOf(g.n)<0).map(g=>g);
  if(unknown.length){
    const names=unknown.map(g=>"・"+g.n).join("\n");
    if(confirm("カタログに無い材料があります：\n"+names+"\n\nカタログにも登録しますか？\n\n［OK］登録して保存（次から選ぶだけで使えます）\n［キャンセル］この献立にだけ保存")){
      unknown.forEach(g=>{
        if(!S.customCatalog.some(x=>x.name===g.n)) S.customCatalog.push({name:g.n, alias:"", unit:g.u||"", cat:"その他"});
      });
      flash(unknown.length+"品をカタログにも登録しました");
    }
  }
  if(t.id){ const d=dish(t.id); d.name=t.name.trim(); d.cat=t.cat; d.sv=sv; d.url=t.url.trim(); d.memo=t.memo.trim(); d.ing=ing; }
  else { S.dishes.push({id:"u"+(S.nextId++), name:t.name.trim(), cat:t.cat, sv:sv, url:t.url.trim(), memo:t.memo.trim(), ing:ing}); }
  save(); closeModal(); if(!unknown.length) flash("保存しました");
}
function copyDish(){
  const t=editTarget;
  S.dishes.push({id:"u"+(S.nextId++), name:t.name.trim()+"（食べ盛り）", cat:t.cat, sv:Math.max(1,Number(t.sv)||3), ing:cleanIng()});
  save(); closeModal(); flash("コピーを作りました。分量を調整してね");
}
function delDish(){
  if(!confirm("この献立を削除しますか？")) return;
  const id=editTarget.id;
  S.dishes=S.dishes.filter(d=>d.id!==id);
  Object.keys(S.plans).forEach(k=>{ S.plans[k]=S.plans[k].map(day=>({b:(day.b||[]).filter(x=>x!==id), l:(day.l||[]).filter(x=>x!==id), d:(day.d||[]).filter(x=>x!==id)})); });
  S.recent=S.recent.filter(x=>x!==id);
  save(); closeModal();
}

/* ===== カテゴリ編集（名前変更・並べ替え・追加・削除） ===== */
let catEdit=[];
function openCatEdit(){ catEdit=S.cats.map(c=>({old:c, name:c})); showModal(); renderCatEdit(); }
function renderCatEdit(){

  h+='<p class="note" style="margin-top:0">名前を書き換え・☰を掴んでドラッグで並べ替え。献立の一覧と選択画面に反映されます。</p>';
  h+='<div class="card listcard">';

    h+=`<span class="arq" style="width:44px;text-align:right;margin:0">${cnt}品</span>`;

  });
  h+='</div>';
  h+='<button class="btn sub small" onclick="addCat()">＋ カテゴリを追加</button>';

function commitCatOrder(ids){ catEdit=ids.map(id=>catEdit[+id]); renderCatEdit(); }
function addCat(){ catEdit.push({old:null, name:""}); renderCatEdit(); }
function delCat(i){ catEdit.splice(i,1); renderCatEdit(); }
function saveCats(){
  const names=catEdit.map(c=>c.name.trim()).filter(Boolean);
  if(new Set(names).size!==names.length){ alert("同じ名前のカテゴリがあります"); return; }
  if(!names.length){ alert("カテゴリを1つ以上残してください"); return; }
  catEdit.forEach(c=>{ const nm=c.name.trim(); if(c.old&&nm&&nm!==c.old){ S.dishes.forEach(d=>{ if(d.cat===c.old) d.cat=nm; }); } });
  S.cats=names;
  if(dishCat&&!S.cats.includes(dishCat)) dishCat="";
  save(); closeModal(); flash("カテゴリを更新しました");
}

/* ===== 定番（いつも買う物） ===== */

  h+='<div class="searchrow">';

  h+='<div class="card listcard">';

      h+=`<span class="paddbtn" onclick="event.stopPropagation();goodsQtyAdd('${esc(g)}',1)">＋</span>`;
    }
    else h+=`<span class="ckb2" onclick="event.stopPropagation();togGoods('${esc(g)}')"></span>`;
    h+='</div>';
  });
  h+='</div>';
  const n=Object.keys(S.goodsSel).filter(k=>S.goodsSel[k]).length;

  h+='</div>';
  return h;
}
/* 定番にその場で品物を追加（カタログにも登録するか選べる） */
function addGoodsHere(){
  const n=prompt("定番に追加する品名（例：猫のえさ）"); if(!n||!n.trim()) return;
  const nm=n.trim();
  if(!S.goods.includes(nm)) S.goods.push(nm);
  S.goodsCatMap[nm]=(goodsFilter&&goodsFilter!=="その他")?goodsFilter:(CAT2GOODS[catInfo(nm).cat]||"その他");
  S.goodsSel[nm]=true;
  if(!allCatalog().some(x=>x.name===nm)){
    if(confirm("「"+nm+"」をカタログにも登録しますか？\n\n［OK］登録する（他の画面からも選べます）\n［キャンセル］定番だけに追加")){
      S.customCatalog.push({name:nm, alias:"", unit:"", cat:"その他"});
    }
  }
  save(); render(); flash(nm+" を定番に追加しました");
}
/* 定番の個数（未設定なら1）と単位（カタログから） */
function goodsQtyOf(g){ const v=Number(S.goodsQty&&S.goodsQty[g]); return v>0?v:1; }
function goodsUnitOf(g){ return (catInfo(g).unit)||""; }
function togGoods(g){

}
function goodsQtyAdd(g,d){

  S.goodsQty[g]=now;

function addSelGoods(){

let catSearch="", catFilter="", catOpenName="", catMode="add";
function allCatalog(){
  const arr=[]; const ov=S.catalogOv||{};
  CATALOG_CATS.forEach(c=>{ CATALOG_RAW[c].forEach(s=>{
    const p=s.split("|");
    const base={name:p[0], alias:p[1]||"", unit:p[2]||"", cat:c};
    const o=ov[base.name];
    if(o&&o.deleted) return;                       /* 消した内蔵品は出さない */
    if(o) arr.push({name:o.name||base.name, alias:o.alias!=null?o.alias:base.alias, unit:o.unit!=null?o.unit:base.unit, cat:o.cat||base.cat, orig:base.name});
    else arr.push(base);
  }); });
  (S.customCatalog||[]).forEach(it=>{ if(!arr.some(x=>x.name===it.name)) arr.push(Object.assign({custom:true},it)); });
  return arr;
}
function catInfo(name){ return allCatalog().find(x=>x.name===name)||{name:name, alias:"", unit:"", cat:"その他"}; }
function openCatalog(){ catMode="add"; catSearch=""; catFilter=""; catOpenName=""; showModal(); renderCatalog(); }

/* ===== 買い物リスト ===== */
let shopFilter="all";
function aggregate(){
  const map=new Map();
  curWeek().forEach(day=>dayIds(day).forEach(id=>{
    const d=dish(id); if(!d) return;
    const f=S.family/(d.sv||3);
    d.ing.forEach(g=>{
      if(excludeUnit(g.n)||pantryUnit(g.n)) return; /* 除外品と常備品はリストに出さない（下部の確認コーナーへ） */
      const k=g.n+"|"+g.u;
      const q=typeof g.q==="number"?g.q*f:g.q;
      if(map.has(k)){ const m=map.get(k); if(typeof q==="number"&&typeof m.q==="number") m.q+=q; }
      else map.set(k,{n:g.n, q:q, u:g.u});
    });
  }));
  const items=[...map.values()].map(x=>{
    const buy=buyQty(x.q,x.u);
    const need=(typeof x.q==="number")?Math.round(x.q*100)/100:x.q;
    return {n:x.n, q:buy, need:(buy!==need?need:undefined), u:x.u, stock:false, done:false, store:S.storeMap[x.n]||""};
  });
  /* 定番（選択中＋⭐毎回）。献立材料と同名なら統合し、商品単位（1本など）の定番側を優先 */
  S.goods.forEach(g=>{
    if(!S.goodsSel[g]&&!S.goodsStar[g]) return;
    const gi={n:g, q:goodsQtyOf(g), u:goodsUnitOf(g), stock:false, done:false, store:S.storeMap[g]||"", daily:true};
    const dup=items.findIndex(it=>it.n===g);
    if(dup>=0) items[dup]=gi; else items.push(gi);
  });
  return items;
}
function togStar(g){ S.goodsStar[g]=!S.goodsStar[g]; if(!S.goodsStar[g]) delete S.goodsStar[g]; save(); render(); }
/* 実際に買える数に直す。個数ものは切り上げ（0.25個は買えないため） */
const COUNT_UNITS=["個","本","枚","丁","パック","袋","缶","玉","尾","切れ","株","束","房","杯","箱","匹","羽","段","カップ"];
function buyQty(q,u){
  if(typeof q!=="number"||!isFinite(q)) return q;
  const e=1e-6;
  if(u==="g"||u==="ml"){
    if(q<=100) return Math.ceil((q-e)/10)*10;      /* 少量は10g刻み */
    return Math.ceil((q-e)/50)*50;                  /* それ以上は50g刻み */
  }
  if(COUNT_UNITS.indexOf(u)>=0) return Math.max(1,Math.ceil(q-e)); /* 個数は切り上げ */
  if(u==="kg"||u==="L"||u==="合") return Math.ceil((q-e)*2)/2;     /* 0.5刻み */
  return Math.round(q*4)/4;                          /* 大さじ等はそのまま */
}
function roundQ(q,u){ return buyQty(q,u); }
/* 買い物リストの数量・単位をその場で編集 */

function rShop(){
  let h='<div class="pagehead"><div class="ptitle">買い物リスト</div><span class="linkbtn" onclick="openStoreSettings()">購入先設定</span></div>';
  if(!S.list||!S.list.items.length){
    h+='<div class="card" style="text-align:center;padding:26px 12px;"><p class="note" style="font-size:14px;margin:0">まだリストがありません。<br>献立表と日用品を選んで作りましょう。</p></div>';
    h+='<button class="cta" onclick="makeListGo()">📝 献立表からリストを作る</button>';
    return h;
  }
  const items=S.list.items;
  const buy=items.filter(x=>!x.stock);
  const doneN=buy.filter(x=>x.done).length;
  const lw=S.list.week;
  if(lw){

    h+=`<div class="listweek ${same?"":"other"}">📅 ${weekRangeLabel(lw)} の週のリスト`;
    if(!same) h+=`<span class="lwnote">（今ホームで見ている週とは別です）</span>`;
    h+='</div>';
  }
  h+=`<div class="pmeta">購入済み <b>${doneN} / ${buy.length}</b></div>`;
  h+=`<div class="pbar"><div class="pfill" style="width:${buy.length?Math.round(doneN/buy.length*100):0}%"></div></div>`;
  h+='<div class="catbar">';
  h+=`<button class="fchip ${shopFilter==="all"?"on":""}" onclick="shopFilter='all';render()">すべて</button>`;
  S.stores.forEach(s=>{ h+=`<button class="fchip ${shopFilter===s?"on":""}" onclick="shopFilter='${esc(s)}';render()">${esc(s)}</button>`; });
  h+=`<button class="fchip ${shopFilter==="未定"?"on":""}" onclick="shopFilter='未定';render()">未定</button>`;
  h+='</div>';
  const undf=items.filter(x=>!x.stock&&!x.store).length;
  h+=`<button class="btn sub wide" onclick="openAssignAll()" style="margin-bottom:6px">🏪 お店をまとめて決める${undf?`（未定 ${undf}品）`:""}</button>`;
  if(shopFilter==="all"){
    const groups={};
    items.forEach((it,i)=>{ const k=it.daily?"日用品":kindOf(it.n); (groups[k]=groups[k]||[]).push(i); });
    ["野菜","肉・魚","その他","日用品"].forEach(k=>{
      if(!groups[k]) return;
      h+=`<div class="kindhead">${k}</div><div class="card listcard">`;
      groups[k].forEach(i=>{ h+=itemRow(i,true); });
      h+='</div>';
    });
    const pn=S.list.pantry||[], ex=S.list.excluded||[];
    h+='<div class="kindhead" style="display:flex;justify-content:space-between;align-items:center">調味料・常備品（家にあるか確認）<span class="linkbtn" style="font-size:12px" onclick="openPantryEdit()">✏️ 編集</span></div><div class="card">';
    if(pn.length){
      h+='<div class="goodsgrid">';
      pn.forEach((p,idx)=>{
        h+=`<button class="gbtn ${p.buy?"sel":""}" onclick="togPantry(${idx})">${esc(p.n)}${p.buy?'<span class="gchk">✓</span>':''}</button>`;
      });
      h+='</div>';
    } else {
      h+='<p class="note" style="margin-top:0">今週の献立で使う調味料はありません。</p>';
    }
    if(ex.length){
      h+=`<div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:${pn.length?"12px":"4px"};font-size:13px;color:var(--sub)">除外中：`;
      ex.forEach((e,idx)=>{
        h+=`<b style="color:var(--ink)">${esc(e.n)}</b><button class="btn small ${e.buy?"":"sub"}" onclick="togExclude(${idx})">${e.buy?"今週は買う ✓":"今週は買う"}</button>`;
      });
      h+='</div>';
    }
    h+='<p class="note" style="margin-bottom:0">今週の献立で使うものだけ表示。タップすると「1本・1袋」として上のリストに入ります。「✏️編集」で品目を追加・削除できます。</p></div>';
    h+='<p class="note">チェックすると購入済みになります。「家にある」を押すと買うものから外れます。</p>';
    h+='<button class="btn sub wide" onclick="openCatalog()">＋ カタログから追加</button>';
    h+='<div class="ctalink small" onclick="addManual()">キーボードで直接入力して追加</div>';
    h+='<div class="ctalink small" onclick="rebuildList()">リストをゼロから作り直す</div>';
  } else {
    const sel=shopFilter;
    const idxs=[];
    items.forEach((it,i)=>{ if(!it.stock&&((it.store||"未定")===sel)) idxs.push(i); });
    h+=`<div class="pmeta" style="margin-top:4px">${esc(sel)}で買う予定　<b>${idxs.length}品</b></div>`;
    h+='<div class="card listcard">';
    if(!idxs.length) h+='<p class="note">この店で買う予定のものはありません</p>';
    idxs.forEach(i=>{ h+=itemRow(i,false); });
    h+='</div>';
    h+='<p class="note">ほかの店で買った場合も、そのままチェックでOK。</p>';
  }
  if(buy.length&&doneN>=buy.length) h+='<p class="note" style="text-align:center;font-size:15px">🎉 全部買えました！おつかれさま！</p>';
  h+='<button class="cta" onclick="finishTrip()">買い物を完了</button>';
  return h;
}
function togStock(i){ const it=S.list.items[i]; it.stock=!it.stock; if(it.stock) it.done=false; save(); render(); }
function togDone(i){ S.list.items[i].done=!S.list.items[i].done; save(); render(); }
function addManual(){
  const n=prompt("追加する品名（例：ケチャップ）"); if(!n||!n.trim()) return;
  S.list.items.push({n:n.trim(), q:"", u:"", stock:false, done:false, store:S.storeMap[n.trim()]||"", manual:true});
  save(); render();
}
function finishTrip(){
  const wl=S.list&&S.list.week?weekRangeLabel(S.list.week)+"の週の":"";
  if(!confirm("買い物おつかれさま！\n"+wl+"リストを空にします。よろしいですか？\n（献立表は消えません。日用品の選択はリセットされます）")) return;
  S.list=null; S.goodsSel={}; shopFilter="all";
  save(); render(); flash("完了！おつかれさまでした🎉");
}

/* 店変更モーダル（今回だけ／標準にする） */
let smIdx=0, smSel="";
function openStoreModal(i){ smIdx=i; smSel=S.list.items[i].store||""; showModal(); renderStoreModal(); }
function renderStoreModal(){
  const it=S.list.items[smIdx];
  let h=`<div class="mhead"><b>${esc(it.n)}はどこで買う？</b></div>`;
  const opts=S.stores.map(s=>[s,s]); opts.push(["","未定"]);
  opts.forEach(o=>{
    h+=`<div class="radiorow ${smSel===o[0]?"on":""}" onclick="smSel='${esc(o[0])}';renderStoreModal()"><span class="radio">${smSel===o[0]?"●":""}</span>${esc(o[1])}</div>`;
  });
  const lbl=smSel||"未定";
  h+=`<button class="cta" style="margin-top:14px" onclick="applyStore(false)">今回だけ${esc(lbl)}にする</button>`;
  if(smSel) h+=`<button class="btn sub wide" onclick="applyStore(true)">今後も${esc(lbl)}を標準にする</button>`;
  h+='<p class="note" style="text-align:center">今回だけ変更しても、いつもの購入先は変わりません。</p>';
  h+='<div class="ctalink" onclick="closeModal()">キャンセル</div>';
  setHTML(document.getElementById("modal"),h);
}
function applyStore(asDefault){
  const it=S.list.items[smIdx];
  it.store=smSel;
  if(asDefault){
    if(smSel) S.storeMap[it.n]=smSel; else delete S.storeMap[it.n];
    flash("「"+it.n+"」のいつもの購入先を設定しました");
  } else {
    flash(smSel?("今回は"+smSel+"で買います"):"未定にしました");
  }
  save(); closeModal();
}

/* お店をまとめて決める画面（ポンポン割り当て＋一括ボタン） */
let assignRemember=true; /* true=いつもの店として記憶 / false=今回だけ */
function togAssignRemember(){ assignRemember=!assignRemember; renderAssignAll(); }
function openAssignAll(){ showModal(); renderAssignAll(); }
function renderAssignAll(){
  let h='<div class="mhead back"><button class="backbtn" onclick="closeModal()">←</button><b>お店をまとめて決める</b></div>';
  h+='<p class="note" style="margin-top:0">品物の下のお店をタップして選びます。</p>';
  h+='<div class="card" style="padding:10px 12px;margin-bottom:10px">';
  h+='<div style="font-size:12px;color:var(--sub);margin-bottom:6px">選んだ店の扱い</div><div class="aropts">';
  h+=`<button class="sopt" style="${assignRemember?"background:var(--or);border-color:var(--or);color:#fff":""}" onclick="if(!assignRemember)togAssignRemember()">⭐ 次回からも自動</button>`;
  h+=`<button class="sopt" style="${!assignRemember?"background:var(--or);border-color:var(--or);color:#fff":""}" onclick="if(assignRemember)togAssignRemember()">今回だけ</button>`;
  h+='</div></div>';
  h+='<div class="kindhead" style="margin-top:4px">全部いっぺんに</div><div class="aropts" style="margin-bottom:6px">';
  S.stores.forEach(s=>{ h+=`<button class="sopt" style="border-color:${storeColor(s)};color:${storeColor(s)}" onclick="assignAll('${esc(s)}')">全部 ${esc(s)}</button>`; });
  h+='<button class="sopt" onclick="assignAll(\'\')">全部 未定に</button>';
  h+='<button class="sopt" style="border-style:dashed" onclick="addStoreHere()">＋ 店を追加</button></div>';
  const buy=[]; S.list.items.forEach((it,i)=>{ if(!it.stock) buy.push(i); });
  h+='<div class="kindhead">品物ごと</div><div class="card listcard">';
  if(!buy.length) h+='<p class="note">買うものがありません</p>';
  buy.forEach(i=>{
    const it=S.list.items[i];
    h+=`<div class="assignrow"><div class="arname">${esc(it.n)}<span class="arq">${fmtQ(it.q)}${esc(it.u)}</span></div><div class="aropts">`;
    S.stores.forEach(s=>{ const on=it.store===s; h+=`<button class="sopt" style="${on?`background:${storeColor(s)};border-color:${storeColor(s)};color:#fff`:`border-color:${storeColor(s)};color:${storeColor(s)}`}" onclick="assignOne(${i},'${esc(s)}')">${esc(s)}</button>`; });
    h+='</div></div>';
  });
  h+='</div><button class="cta" onclick="closeModal()">できた</button>';
  setHTML(document.getElementById("modal"),h);
}
function assignOne(i,s){
  const it=S.list.items[i]; it.store=s;
  if(assignRemember){
    if(s) S.storeMap[it.n]=s; else delete S.storeMap[it.n];
    flash(s?(it.n+" → "+s+"（次回から自動）"):(it.n+" を未定に（記憶も解除）"));
  } else {
    flash(s?(it.n+" → "+s+"（今回だけ）"):(it.n+" を今回だけ未定に"));
  }
  save(); renderAssignAll();
}
function addStoreHere(){
  const n=prompt("店の名前（例：ヨークベニマル）"); if(!n||!n.trim()) return;
  const nm=n.trim();
  if(S.stores.includes(nm)){ flash("すでにあります"); return; }
  S.stores.push(nm); save(); renderAssignAll(); flash(nm+" を追加しました");
}
function assignAll(s){
  S.list.items.forEach(it=>{
    if(it.stock) return;
    it.store=s;
    if(assignRemember){ if(s) S.storeMap[it.n]=s; else delete S.storeMap[it.n]; }
  });
  save(); renderAssignAll();
  flash((s?("全部 "+s+" に"):"全部 未定に")+(assignRemember?"（次回からも自動）":"（今回だけ）"));
}

/* 購入先設定（店の管理＋品物ごとの標準店） */
let psSearch="";
function openStoreSettings(){ psSearch=""; showModal(); renderStoreSettings(); }
function renderStoreSettings(){
  let h='<div class="mhead back"><button class="backbtn" onclick="closeModal()">←</button><b>いつもの購入先</b></div>';
  h+='<div class="kindhead" style="margin-top:0">1. 店の管理</div><div class="card listcard">';
  S.stores.forEach((s,i)=>{
    h+=`<div class="item"><div class="info"><div class="inm">${esc(s)}</div></div><button class="btn small gray" onclick="renStore(${i})">✏️ 変更</button><button class="btn small danger" onclick="delStore(${i})">削除</button></div>`;
  });
  h+='</div><button class="btn sub wide" onclick="addStore()">＋ 店を追加</button>';
  h+='<div class="kindhead">2. 品物ごとのいつもの購入先</div>';
  h+=`<input type="text" class="search" id="sStore" placeholder="🔍 品物を検索" value="${esc(psSearch)}" oninput="psSearch=this.value;deferRender(renderStoreSettings)">`;
  const q=psSearch.trim();
  const names=[...new Set([...(S.list?S.list.items.map(x=>x.n):[]), ...Object.keys(S.storeMap), ...S.goods])].filter(n=>!q||n.includes(q));
  h+='<div class="card listcard">';
  if(!names.length) h+='<p class="note">見つかりません</p>';
  names.slice(0,80).forEach(n=>{
    const cur=S.storeMap[n]||"";
    h+=`<div class="assignrow"><div class="arname">${esc(n)}</div><div class="aropts">`;
    S.stores.forEach(s=>{
      const on=cur===s;
      h+=`<button class="sopt" style="${on?`background:${storeColor(s)};border-color:${storeColor(s)};color:#fff`:`border-color:${storeColor(s)};color:${storeColor(s)}`}" onclick="setDefaultStore('${esc(n)}','${esc(s)}')">${esc(s)}</button>`;
    });
    h+=`<button class="sopt" onclick="setDefaultStore('${esc(n)}','')">未定</button>`;
    h+='</div></div>';
  });
  h+='</div>';
  h+='<p class="note">ここで設定した店が、次回の買い物リストに自動表示されます。</p>';
  h+='<button class="cta" onclick="closeModal();flash(\'保存しました\')">設定を保存</button>';
  setHTML(document.getElementById("modal"),h);
}
function setDefaultStore(n,v){
  if(v) S.storeMap[n]=v; else delete S.storeMap[n];
  if(S.list) S.list.items.forEach(it=>{ if(it.n===n&&!it.done) it.store=v; });
  flash(v?(n+" → "+v+"（次回から自動）"):(n+" を未定に"));
  save(); renderStoreSettings();
}
function addStore(){
  const n=prompt("店の名前（例：セブン）"); if(!n||!n.trim()) return;
  if(!S.stores.includes(n.trim())) S.stores.push(n.trim());
  save();
  if(document.getElementById("overlay").classList.contains("show")) renderStoreSettings(); else render();
}
function renStore(i){
  const n=prompt("店名を変更", S.stores[i]); if(!n||!n.trim()) return;
  const old=S.stores[i], nn=n.trim();
  S.stores[i]=nn;
  Object.keys(S.storeMap).forEach(k=>{ if(S.storeMap[k]===old) S.storeMap[k]=nn; });
  if(S.list) S.list.items.forEach(it=>{ if(it.store===old) it.store=nn; });
  if(shopFilter===old) shopFilter=nn;
  save(); renderStoreSettings();
}
function delStore(i){
  const old=S.stores[i];
  if(!confirm("「"+old+"」を削除しますか？この店に振り分けた品物は「未定」になります。")) return;
  S.stores.splice(i,1);
  Object.keys(S.storeMap).forEach(k=>{ if(S.storeMap[k]===old) delete S.storeMap[k]; });
  if(S.list) S.list.items.forEach(it=>{ if(it.store===old) it.store=""; });
  if(shopFilter===old) shopFilter="all";
  save(); renderStoreSettings();
}

/* ===== バックアップ・初期化 ===== */
function exportData(){
  const a=document.createElement("a");
  a.href="data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(S));
  a.download="matomegai-backup.json"; a.click();
}
function importData(inp){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d&&d.dishes){ S=d; load2(); save(); render(); flash("読み込みました"); } else alert("ファイルが違うみたい"); }catch(e){ alert("読み込めませんでした"); } };
  r.readAsText(f);
}
function load2(){ if(!S.family)S.family=3; if(!S.recent)S.recent=[]; S.dishes.forEach(d=>{ if(!d.sv)d.sv=3; }); }
function resetAll(){
  if(!confirm("すべてのデータを初期状態に戻します。自分で作った献立や設定も消えます。いいですか？")) return;
  if(!confirm("本当に初期化しますか？（バックアップ保存をおすすめします）")) return;
  S=newState(); save(); render();
}

/* ===== モーダル ===== */
let modalOpen=false, modalClosing=false;
function showModal(){
  document.getElementById("overlay").classList.add("show");
  /* 開くたびに必ず履歴を1つ積む。こうすると「戻る」は必ずこの画面を閉じる動きになる */
  modalOpen=true; modalClosing=false;
  history.pushState({modal:1,tab:TAB},"");
}
function closeModal(){
  /* modalClosing で二重呼び出しを防ぐ（二重に history.back() するとアプリごと閉じてしまう） */
  if(modalOpen&&!modalClosing){ modalClosing=true; history.back(); return; }
  if(!modalOpen){ document.getElementById("overlay").classList.remove("show"); render(); }
}
let exitArmed=false;
window.addEventListener("popstate",function(e){
  const ov=document.getElementById("overlay");
  /* まずモーダルが開いていれば閉じる（表示だけ残っている食い違いも拾う） */
  if(modalOpen||ov.classList.contains("show")){
    modalOpen=false; modalClosing=false;
    ov.classList.remove("show");
    const st0=e.state; if(st0&&st0.tab) TAB=st0.tab;
    render(); return;
  }
  const st=e.state;
  /* 土台まで戻ってきた＝一番最初の画面で「戻る」を押した */
  if(st&&st.base){
    if(TAB!=="week"){ /* 念のためホームへ戻して踏みとどまる */
      TAB="week"; history.pushState({tab:"week"},""); render(); return;
    }
    if(!exitArmed){
      exitArmed=true;
      history.pushState({tab:"week"},"");   /* 押し戻して閉じさせない */
      flash("もう一度「戻る」で閉じます");
      setTimeout(function(){ exitArmed=false; },2000);
      return;
    }
    history.back();  /* 2回目＝本当に閉じる */
    return;
  }
  /* サブタブにいる → ホームまで戻す */
  if(st&&st.tab&&st.tab!=="week"){ TAB=st.tab; render(); return; }
  if(TAB!=="week"){ TAB="week"; render(); return; }
});

load();
/* 土台の履歴を1つ余分に確保しておく。
   これが無いと、ホーム画面から起動したPWAでは「戻る」の行き先が無く、
   popstateも起きずにアプリが即終了してしまう。 */
history.replaceState({tab:"week", base:true},"");
history.pushState({tab:"week"},"");
render();

/* アプリとしてインストール＆オフライン対応（http/https のときだけ） */
let swReloaded=false;
if("serviceWorker" in navigator && location.protocol.indexOf("http")===0){
  window.addEventListener("load",function(){
    navigator.serviceWorker.register("sw.js").then(function(reg){
      reg.update();                       /* 起動のたびに新版がないか確認 */
      setInterval(function(){ reg.update(); }, 60*60*1000);
    }).catch(function(){});
    /* 新しいService Workerに入れ替わったら1度だけ読み込み直す＝常に最新画面 */
    navigator.serviceWorker.addEventListener("controllerchange",function(){
      if(swReloaded) return; swReloaded=true; location.reload();
    });
  });
}
/* 設定から呼ぶ「アプリを最新に更新」 */
function forceUpdate(){
  if(!confirm("アプリを最新版に更新します。\n（献立や買い物リストのデータは消えません）")) return;
  const done=function(){ location.replace(location.pathname+"?u="+Date.now()); };
  if(!("serviceWorker" in navigator)){ done(); return; }
  caches.keys().then(function(keys){ return Promise.all(keys.map(function(k){ return caches.delete(k); })); })
    .catch(function(){})
    .then(function(){ return navigator.serviceWorker.getRegistrations(); })
    .then(function(regs){ return Promise.all((regs||[]).map(function(r){ return r.unregister(); })); })
    .catch(function(){})
    .then(done, done);
}
